image:
  repository: ghcr.io/mnorrsken/apt-exporter
  tag: ""  # defaults to Chart.appVersion
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9120

args:
  - "--apt.rootfs=/host"
  - "--apt.refresh-interval=24h"

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

securityContext:
  runAsUser: 0   # root required for chroot syscall
  runAsGroup: 0
  fsGroup: 0

nodeSelector: {}

tolerations:
  - operator: Exists

serviceMonitor:
  enabled: false
  interval: 60m
  namespace: ""
  additionalLabels: {}

podAnnotations: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}
