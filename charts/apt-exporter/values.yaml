image:
  repository: ghcr.io/mnorrsken/apt-exporter
  tag: ""  # defaults to Chart.appVersion
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9120

args:
  - "--apt.rootfs=/host"
  - "--apt.refresh-interval=24h"

resources:
  limits:
    cpu: 100m
    memory: 64Mi
  requests:
    cpu: 10m
    memory: 32Mi

securityContext:
  runAsUser: 65534   # nobody
  runAsGroup: 65534
  fsGroup: 65534

aptHook:
  # Install an APT post-invoke hook on the host so apt operations
  # automatically trigger a metrics refresh. Requires a privileged
  # init container (runs as root) and hostNetwork (so the host's
  # curl can reach the exporter on localhost:9120).
  enabled: false

nodeSelector: {}

tolerations:
  - operator: Exists

serviceMonitor:
  enabled: false
  interval: 60m
  namespace: ""
  additionalLabels: {}

podAnnotations: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}
